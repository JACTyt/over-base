<main class="min-h-screen flex flex-col items-center justify-center bg-gray-900 p-8 space-y-6">
  <h1 class="text-3xl font-bold text-white">{{ title() }}</h1>

  <button
    (click)="sendRequest()"
    class="px-6 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded"
  >
    Draft Heroes
  </button>

  <div class="text-white">
    <h2 class="text-xl font-semibold mb-2">Drafted Heroes:</h2>

    <ul class="space-y-2">
      @for (hero of heroSummaries(); track $index) {
        <li class="bg-gray-800 p-4 rounded-lg shadow">
          <img
            [src]="'/assets/icons/' + hero.name.replace(':', '') + '.png'"
            alt="{{ hero.name }}"
            class="w-16 h-16 rounded-full mb-2"
          >
          <p class="font-bold text-lg">{{ hero.name }}</p>
          <p class="text-gray-300">{{ hero.role }}</p>
        </li>
      }
    </ul>
  </div>
</main>
